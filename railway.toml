[build]
builder = "nixpacks"
buildCommand = "DISABLE_ADMIN=false yarn workspace @dtc/backend build && mkdir -p apps/backend/public && cp -r apps/backend/.medusa/server/public/admin apps/backend/public/ && echo 'Admin files copied to public/admin successfully'"

[deploy]
startCommand = "yarn workspace @dtc/backend run start:prod"
healthcheckPath = "/health"
healthcheckTimeout = 300
